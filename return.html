<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return Book - Library System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fdfdfd; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; border-top: 6px solid #2e7d32; }
        h2 { color: #2e7d32; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 6px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1b5e20; }
        .back { display: block; text-align: center; margin-top: 15px; color: #2e7d32; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔄 Return Book</h2>
    <form action="backend/returnbook.php" method="POST">
        <label>Book ID</label>
        <input type="number" name="book_id" placeholder="Enter the ID inside the book" required>
        <button type="submit">Process Return</button>
    </form>
    <a href="index.html" class="back">← Back to Dashboard</a>
</div>

</body>
</html>
