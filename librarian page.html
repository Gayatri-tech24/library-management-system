
<!DOCTYPE html>
<html>
<head>
    <title>Librarian Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Sidebar */
        .sidebar{
            width:240px;
            height:100vh;
            background:#1f2d3d;
            position:fixed;
            left:0;
            top:0;
            color:white;
            padding-top:20px;
            box-shadow:2px 0px 10px rgba(0,0,0,0.2);
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:30px;
            font-size:28px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            transition:0.3s;
            font-size:16px;
        }

        .sidebar a:hover{
            background:#34495e;
            padding-left:35px;
        }

        .active{
            background:#34495e;
        }

        /* Main Content */
        .main{
            margin-left:240px;
            padding:25px;
        }

        /* Header */
        .header{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .header h2{
            color:#2c3e50;
        }

        .logout-btn{
            padding:10px 18px;
            border:none;
            background:#e74c3c;
            color:white;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#c0392b;
        }

        /* Dashboard Cards */
        .cards{
            margin-top:25px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h3{
            margin-bottom:10px;
            color:#555;
        }

        .card p{
            font-size:30px;
            font-weight:bold;
            color:#1565c0;
        }

        .card:nth-child(1){
            border-top:5px solid #3498db;
        }

        .card:nth-child(2){
            border-top:5px solid #27ae60;
        }

        .card:nth-child(3){
            border-top:5px solid #e67e22;
        }

        .card:nth-child(4){
            border-top:5px solid #9b59b6;
        }

        /* Activity Section */
        .activity{
            margin-top:35px;
            background:white;
            padding:25px;
            border-radius:12px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        .activity-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .activity-header input{
            padding:10px;
            width:250px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        /* Table */
        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        th{
            background:#1565c0;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        tr:hover{
            background:#eaf2ff;
        }

    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

    <h2> Library</h2>

    <a href="librarian.html" class="active"> Dashboard</a>

    <a href="addbook.html"> Add Book</a>

    <a href="issue.html"> Issue Book</a>

    <a href="return.html"> Return Book</a>

    <a href="usermanagement.html"> User Management</a>

    <a href="viewbook.html"> View Books</a>

    <a href="register.html"> Register Student</a>

</div>

<!-- Main Content -->
<div class="main">

    <!-- Header -->
    <div class="header">

        <div>
            <h2>Welcome Librarian </h2>
           
        </div>

        <button class="logout-btn"
        onclick="location.href='index.html'">
            Logout
        </button>

    </div>

   

    <!-- Recent Activity -->
    <div class="activity">

        <div class="activity-header">

            <h2>Recent Activity</h2>

            <input type="text"
            placeholder="Search Activity...">

        </div>

        <table>

            <tr>
                <th>User ID</th>
                <th>Book ID</th>
                <th>Status</th>
                <th>Date</th>
            </tr>

            <tr>
                <td>101</td>
                <td>B001</td>
                <td>Issued</td>
                <td>10-05-2026</td>
            </tr>

            <tr>
                <td>102</td>
                <td>B002</td>
                <td>Returned</td>
                <td>11-05-2026</td>
            </tr>

            <tr>
                <td>103</td>
                <td>B003</td>
                <td>Issued</td>
                <td>12-05-2026</td>
            </tr>

            <tr>
                <td>104</td>
                <td>B004</td>
                <td>Returned</td>
                <td>13-05-2026</td>
            </tr>

        </table>

    </div>

</div>

</body>
</html>
