
<!DOCTYPE html>
<html>
<head>
    <title>Issue Book</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* Container */
        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1e8449;
        }

        /* Table */
        .table-container {
            width: 80%;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #27ae60;
            color: white;
        }
    </style>
</head>

<body>

<div class="navbar">Library Management System</div>

<div class="container">
    <h2>Issue Book</h2>

    <form onsubmit="issueBook(event)">
        
        <label>User ID</label>
        <input type="text" id="userId" required>

        <label>Book ID</label>
        <input type="text" id="bookId" required>

        <label>Issue Date</label>
        <input type="date" id="issueDate" required>

        <label>Return Date</label>
        <input type="date" id="returnDate" required>

        <button class="btn">Issue Book</button>
    </form>
</div>

<!-- Table -->
<div class="table-container">
    <h2 style="text-align:center;">Issued Books</h2>
    <table id="issueTable">
        <tr>
            <th>User ID</th>
            <th>Book ID</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Status</th>
        </tr>
    </table>
</div>

<script>
function issueBook(event) {
    event.preventDefault();

    let userId = document.getElementById("userId").value;
    let bookId = document.getElementById("bookId").value;
    let issueDate = document.getElementById("issueDate").value;
    let returnDate = document.getElementById("returnDate").value;

    let table = document.getElementById("issueTable");
    let row = table.insertRow();

    row.insertCell(0).innerHTML = userId;
    row.insertCell(1).innerHTML = bookId;
    row.insertCell(2).innerHTML = issueDate;
    row.insertCell(3).innerHTML = returnDate;
    row.insertCell(4).innerHTML = "Issued";

    alert("Book Issued Successfully!");

    document.querySelector("form").reset();
}
</script>

</body>
</html>
