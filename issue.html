<!DOCTYPE html>
<html>
<head>
    <title>Issue Book</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* Container */
        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }

        input:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            background:#3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background:#2980b9;
        }

        /* Table */
        .table-container {
            width: 80%;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background:#3498db;
            color: white;
        }
    </style>
</head>

<body>

<div class="navbar">Library Management System</div>

<div class="container">
    <h2>Issue Book</h2>

    <!-- Form now points to your PHP file via POST method -->
    <form action="backend/borrowbooks.php" method="POST">
        
        <label>User ID (Roll No)</label>
        <input type="text" id="userId" name="roll_no" required>

        <label>Book Name</label>
        <input type="text" id="bookId" name="book_name" required>

        <label>Issue Date</label>
        <input type="date" id="issueDate" name="issue_date" required>

        <label>Return Date</label>
        <input type="date" id="returnDate" name="return_date" required>

        <!-- name="issue_book" is required for the PHP 'isset' check -->
        <button type="submit" name="issue_book" class="btn">Issue Book</button>
    </form>
</div>

<!-- This table will now display data only if you fetch it from the database via PHP -->
<div class="table-container">
    <h2 style="text-align:center;">Issued Books</h2>
    <table id="issueTable">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Book Name</th>
                <th>Issue Date</th>
                <th>Return Date</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data from the database should be populated here using a PHP loop -->
        </tbody>
    </table>
</div>

</body>
</html>
