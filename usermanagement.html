
<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* Form Container */
        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: green;
            outline: none;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            background:green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background:green;
        }

        /* Table */
        .table-container {
            width: 85%;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: green;
            color: white;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<div class="navbar">Library Management System</div>

<div class="container">
    <h2>User Management</h2>

    <form onsubmit="addUser(event)">
        
        <label>User ID</label>
        <input type="text" id="userId" required>

        <label>Name</label>
        <input type="text" id="name" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Phone</label>
        <input type="text" id="phone" required>

        <button class="btn">Add User</button>
    </form>
</div>

<!-- Table -->
<div class="table-container">
    <h2 style="text-align:center;">User List</h2>

    <table id="userTable">
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </table>
</div>

<script>
function addUser(event) {
    event.preventDefault();

    let id = document.getElementById("userId").value;
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;

    let table = document.getElementById("userTable");
    let row = table.insertRow();

    row.insertCell(0).innerHTML = id;
    row.insertCell(1).innerHTML = name;
    row.insertCell(2).innerHTML = email;
    row.insertCell(3).innerHTML = phone;

    let actionCell = row.insertCell(4);
    actionCell.innerHTML = '<button class="delete-btn" onclick="deleteUser(this)">Delete</button>';

    alert("User Added Successfully!");

    document.querySelector("form").reset();
}

function deleteUser(btn) {
    let row = btn.parentNode.parentNode;
    row.remove();
}
</script>

</body>
</html>
