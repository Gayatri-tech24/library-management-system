<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>
    <style>
        body { font-family: Arial; background: #eef5ff; padding: 50px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; border-top: 5px solid #6a1b9a; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6a1b9a; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        a { display: block; margin-top: 15px; color: #6a1b9a; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👤 Student Registration</h2>
        <form action="backend//auth/register.php" method="POST">
            <input type="text" name="student_name" placeholder="Full Name" required>
            <input type="text" name="roll_no" placeholder="Roll Number (e.g. 1AJ24CS...)" required>
            <button type="submit">Register Student</button>
        </form>
        <a href="index.html">← Back to Dashboard</a>
    </div>
</body>
</html>
