<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Book - Library System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #eef5ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid #0d47a1;
        }

        h2 {
            color: #0d47a1;
            margin-bottom: 20px;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Important for padding */
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1565c0;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #0d47a1;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #1565c0;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>📚 Add New Book</h2>
        
        <form action="backend/addbooks.php" method="POST">
            <label for="book_name">Book Title</label>
            <input type="text" id="book_name" name="book_name" placeholder="e.g. Operating System Concepts" required>

            <label for="author">Author Name</label>
            <input type="text" id="author" name="author" placeholder="e.g. Abraham Silberschatz" required>

            <label for="status">Availability Status</label>
            <select id="status" name="status">
                <option value="Available">Available</option>
                <option value="Borrowed">Borrowed</option>
            </select>

            <button type="submit">Add Book to Inventory</button>
        </form>

        <a href="index.html" class="back-link">← Return to Dashboard</a>
    </div>

</body>
</html>
