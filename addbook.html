
<!DOCTYPE html>
<html>
<head>
    <title>Add Book - Library</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        /* Container */
        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }

        /* Table */
        .table-container {
            width: 80%;
            margin: 30px auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #3498db;
            color: white;
        }
    </style>
</head>

<body>

<div class="navbar">Library Management System</div>

<div class="container">
    <h2>Add New Book</h2>

    <form onsubmit="addBook(event)">
        
        <label>Book Title</label>
        <input type="text" id="title" required>

        <label>Author</label>
        <input type="text" id="author" required>

        <label>Category</label>
        <select id="category" required>
            <option value="">-- Select Category --</option>
            <option>Programming</option>
            <option>Data Structures</option>
            <option>Algorithms</option>
            <option>Database Management</option>
            <option>Operating Systems</option>
            <option>Computer Networks</option>
            <option>Artificial Intelligence</option>
            <option>Machine Learning</option>
            <option>Cyber Security</option>
            <option>Web Development</option>
            <option>Software Engineering</option>
            <option>Cloud Computing</option>
        </select>

        <label>Quantity</label>
        <input type="number" id="quantity" min="1" required>

        <label>Published Year</label>
        <input type="number" id="year" min="1900" max="2026">

        <button class="btn">Add Book</button>
    </form>
</div>

<!-- Table -->
<div class="table-container">
    <h2 style="text-align:center;">Book List</h2>
    <table id="bookTable">
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Year</th>
        </tr>
    </table>
</div>

<script>
function addBook(event) {
    event.preventDefault();

    let title = document.getElementById("title").value;
    let author = document.getElementById("author").value;
    let category = document.getElementById("category").value;
    let quantity = document.getElementById("quantity").value;
    let year = document.getElementById("year").value;

    let table = document.getElementById("bookTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = title;
    row.insertCell(1).innerHTML = author;
    row.insertCell(2).innerHTML = category;
    row.insertCell(3).innerHTML = quantity;
    row.insertCell(4).innerHTML = year;

    alert("Book Added Successfully!");

    document.querySelector("form").reset();
}
</script>

</body>
</html>
