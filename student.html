<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef5ff;
        }

        header {
            background: #0d47a1;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        nav {
            background: #1565c0;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 16px;
        }

        nav a:hover {
            color: #bbdefb;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 30px;
        }

        .welcome {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-top: 5px solid #1565c0;
        }

        .card h3 {
            color: #0d47a1;
        }

        .card button {
            padding: 10px 15px;
            border: none;
            background: #1565c0;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .card button:hover {
            background: #0d47a1;
        }

        footer {
            background: #0d47a1;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    Student Dashboard
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="viewbook.html">View Books</a>
    <a href="issuebook.html">Issue Book</a>
    <a href="returnbook.html">Return Book</a>
    <a href="#">Logout</a>
</nav>

<div class="container">

    <div class="welcome">
        <h2>Welcome Student 👋</h2>
        <p>Access your library services here</p>
    </div>

    <div class="grid">

        <div class="card">
            <h3>View Books</h3>
            <p>Check available books</p>
            <button onclick="location.href='backend/viewbooks.php'">Open</button>
        </div>

        <div class="card">
            <h3>Issue Book</h3>
            <p>Issue books to students</p>
            <button onclick="location.href='issue.html'">Open</button>
        </div>

        <div class="card">
            <h3>Return Book</h3>
            <p>Return issued books</p>
            <button onclick="location.href='backend/returnbook.php'">Open</button>
        </div>

        <!-- <div class="card">
            <h3>My Books</h3>
            <p>View issued books</p>
            <button onclick="location.href='#'">Open</button>
        </div>
    -->
    </div>

</div>

</body>
</html>
